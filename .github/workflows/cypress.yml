name: Cypress Tests

on:
  push:
    branches: [ main ]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Start app
        run: npm run dev &

      - name: Wait for app
        run: npx wait-on http://localhost:5173

      - name: Run Cypress Tests
        run: npx cypress run